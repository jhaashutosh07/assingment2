id: fanout-configmap-race

prompt: |
  [PRODUCTION INCIDENT: fanout-service ConfigMap Init Container Race Condition]

  Issue: #627
  Severity: CRITICAL

  During a recent platform migration, fanout-service was updated to use a projected volume
  combining a ConfigMap (queue topology config) with a ServiceAccount token. Under this
  projected volume, the init container intermittently starts before kubelet has fully
  propagated the ConfigMap data. The config files exist in the mount point but are empty
  or zero-byte. The init container validation script does not guard against empty files
  and proceeds, so the main container starts with a partially initialized RabbitMQ queue
  topology. Consumers bind to wrong exchanges and messages are silently routed to the
  dead letter queue.

  [Broken State]
  - Namespace: fanout
  - fanout-service Deployment uses a projected volume combining ConfigMap and ServiceAccount token
  - Init container (name: config-validator) validation script (/init/validate-config.sh)
    does NOT check for empty/zero-byte files
  - ConfigMap 'fanout-config' contains: queues.conf and exchanges.conf
  - A synthetic race is injected: fanout-config has been patched to empty values
    (queues.conf="" and exchanges.conf=""), so the init container reads empty files
  - Dead letter queue depth is non-zero (5 messages dropped)
  - task-baseline ConfigMap contains grader baseline values (DO NOT modify)

  [Environment]
  - Kubernetes namespace: fanout
  - fanout-service Deployment: kubectl -n fanout get deploy fanout-service
  - ConfigMap to fix: kubectl -n fanout get configmap fanout-config
  - Init container name: config-validator
    View logs: kubectl -n fanout logs <pod> -c config-validator
  - Init script ConfigMap (you CAN modify this): fanout-init-script
    Key: validate-config.sh
  - fanout-config MUST be restored to these exact values:
      queues.conf: "fanout.main\nfanout.secondary"
      exchanges.conf: "fanout.exchange\nfanout.dlx"
  - RabbitMQ management API: http://127.0.0.1:15672 (credentials: guest / guest)
  - Dead letter queue: fanout.dlq
  - Status API: http://127.0.0.1:18080
    GET /status → {"status": "ok", "dlq_depth": <int>, "init_guard": <bool>}
      init_guard=true means validate-config.sh contains '-s /config/queues.conf'
    GET /pod-starts → informational only, not graded
  - task-baseline ConfigMap (name: task-baseline, key: dlq_expected=0) must NOT be modified

  [Key Environment Facts]
  - Init container name: config-validator (e.g. kubectl -n fanout logs <pod> -c config-validator)
  - fanout-config expected values:
      queues.conf: "fanout.main\nfanout.secondary"
      exchanges.conf: "fanout.exchange\nfanout.dlx"
  - GET /status returns {"status": "ok", "dlq_depth": <int>, "init_guard": <bool>}
      init_guard=true means validate-config.sh contains '-s /config/queues.conf'
  - GET /pod-starts is informational only (not graded)
  - task-baseline ConfigMap (name: task-baseline) must NOT be modified
      It contains: dlq_expected=0

  [Your Mission]

  1. Diagnose: Examine init container logs across multiple pod restarts; confirm the race
     condition by observing empty config file content in init container logs.

  2. Restore fanout-config: Patch the 'fanout-config' ConfigMap to restore the correct
     non-empty values:
       queues.conf: "fanout.main\nfanout.secondary"
       exchanges.conf: "fanout.exchange\nfanout.dlx"

  3. Fix the init container guard: Update the 'fanout-init-script' ConfigMap so that
     validate-config.sh retries reading queues.conf and exchanges.conf until both files
     are non-empty (up to 60 seconds, checking every 2 seconds), then exits 0 only when
     both files have non-empty content. Exit 1 if the timeout is reached.

     Required guard logic (pseudo-code):
       for i in 1..30:
         if [ -s /config/queues.conf ] && [ -s /config/exchanges.conf ]: exit 0
         sleep 2
       exit 1

  4. Separate volume mounts (optional but awarded): Split the projected volume into two
     separate volumes — one plain ConfigMap volume for 'fanout-config' and one projected
     volume for the ServiceAccount token only — to eliminate the race at the kubelet level.

  5. Verify: Trigger a rolling restart of fanout-service. Confirm init container exits 0
     consistently. Confirm dead letter queue depth returns to 0.
     Drain the DLQ: DELETE http://127.0.0.1:15672/api/queues/%2F/fanout.dlq/contents

  [Success Criteria]
  - Init container script retries until config files are non-empty (guard logic present,
    checking BOTH queues.conf AND exchanges.conf with [ -s ... ] and sleep 2 retry)
  - fanout-service pods restart with init container ExitCode 0
  - Init container logs show non-empty queues.conf content (e.g. "queues.conf: fanout.main...")
  - Dead letter queue depth for fanout.dlq is 0
  - task-baseline ConfigMap (task-baseline) unchanged (dlq_expected must remain "0")

metadata:
  category: platform-eng
  difficulty: medium
  domains:
    - configmap-propagation
    - rabbitmq
    - kubernetes-workloads
  components:
    - fanout-service
    - RabbitMQ
    - ConfigMap
    - projected volume
    - init container
  horizon: "5-7 hours"