id: fanout-configmap-race

prompt: |
  [PRODUCTION INCIDENT: fanout-service multi-fault degradation]

  Issue: #627
  Severity: CRITICAL

  The fanout-service is degraded: messages are accumulating in the dead letter queue
  (fanout.dlq) and the DLQ depth is growing. Multiple contributing faults are present.
  Your job is to diagnose all root causes and repair them.

  [Broken State]
  - Namespace: fanout
  - fanout-service Deployment uses a projected volume combining ConfigMap and ServiceAccount token
  - Init container (name: config-validator) runs /init/validate-config.sh on startup
  - ConfigMap 'fanout-config' (queues.conf, exchanges.conf) is the source of RabbitMQ topology
  - Dead letter queue (fanout.dlq) depth is non-zero and growing over time
  - task-baseline ConfigMap is a system integrity record — do NOT modify it

  [Environment]
  - Kubernetes namespace: fanout
  - fanout-service Deployment: kubectl -n fanout get deploy fanout-service
  - ConfigMap to inspect/fix: kubectl -n fanout get configmap fanout-config
  - Init container name: config-validator
    View logs: kubectl -n fanout logs <pod> -c config-validator
  - Init script ConfigMap (you CAN modify this): fanout-init-script
    Key: validate-config.sh
  - The original config values may be recoverable from ConfigMap annotations
  - RabbitMQ management API: http://127.0.0.1:15672 (credentials: guest / guest)
  - Dead letter queue: fanout.dlq
  - RabbitMQ topology info: kubectl -n fanout get configmap fanout-exchange-config -o yaml
  - Binding creation: POST http://127.0.0.1:15672/api/bindings/%2F/e/{exchange}/q/{queue}
  - Drain DLQ: DELETE http://127.0.0.1:15672/api/queues/%2F/fanout.dlq/contents
  - Status API: http://127.0.0.1:18080
    GET /status returns operational status
    GET /pod-starts → informational diagnostic endpoint only
  - task-baseline ConfigMap (name: task-baseline, key: dlq_expected=0) must NOT be modified

  [Key Environment Facts]
  - Init container name: config-validator (e.g. kubectl -n fanout logs <pod> -c config-validator)
  - The original config values may be recoverable from ConfigMap annotations
  - GET /status returns operational status
  - GET /pod-starts is an informational diagnostic endpoint only
  - task-baseline ConfigMap (name: task-baseline) must NOT be modified
      It contains: dlq_expected=0

  [Your Mission]

  1. Diagnose: Determine why fanout-service is dropping messages into the dead letter queue.
     There are multiple contributing faults — find all of them.

  2. Repair: Fix all identified faults so that:
     - The init container validates config files correctly before proceeding
     - The fanout-config ConfigMap has the correct non-empty values
     - RabbitMQ message routing is restored (no new messages going to DLQ)
     - The DLQ is drained to 0

  3. Verify: Confirm fanout-service restarts cleanly and the system is stable.

  [Success Criteria]
  - Init container exits 0 consistently across rolling restarts
  - fanout-config contains the correct topology values
  - No new messages are routed to the dead letter queue
  - fanout.dlq depth is 0
  - RabbitMQ exchange binding is correctly configured
  - task-baseline ConfigMap is unchanged

metadata:
  category: platform-eng
  difficulty: hard
  domains:
    - configmap-propagation
    - rabbitmq
    - kubernetes-workloads
  components:
    - fanout-service
    - RabbitMQ
    - ConfigMap
    - projected volume
    - init container
  horizon: "5-7 hours"