id: fanout-configmap-race

prompt: |
  [PRODUCTION INCIDENT: fanout-service ConfigMap Init Container Race Condition]

  Issue: #627
  Severity: CRITICAL

  During a recent platform migration, fanout-service was updated to use a projected volume
  combining a ConfigMap (queue topology config) with a ServiceAccount token. Under this
  projected volume, the init container intermittently starts before kubelet has fully
  propagated the ConfigMap data. The config files exist in the mount point but are empty
  or zero-byte. The init container validation script does not guard against empty files
  and proceeds, so the main container starts with a partially initialized RabbitMQ queue
  topology. Consumers bind to wrong exchanges and messages are silently routed to the
  dead letter queue.

  [Broken State]
  - Namespace: fanout
  - fanout-service Deployment uses a projected volume combining ConfigMap and ServiceAccount token
  - Init container validation script (/init/validate-config.sh) does NOT check for empty/zero-byte files
  - ConfigMap 'fanout-config' contains: queues.conf and exchanges.conf
  - A synthetic race is injected: init container runs before ConfigMap data is propagated
    (simulated by a separate "poison" ConfigMap that replaces file content with empty strings
     and a Job that patches it back after a delay)
  - Dead letter queue depth is non-zero (messages being dropped)
  - task_baseline ConfigMap contains grader baseline values (DO NOT modify)

  [Environment]
  - Kubernetes namespace: fanout
  - fanout-service Deployment: kubectl -n fanout get deploy fanout-service
  - ConfigMap: kubectl -n fanout get configmap fanout-config
  - Init container script lives at /init/validate-config.sh inside the init container image
    (it is rendered from a ConfigMap 'fanout-init-script' — you CAN modify this)
  - RabbitMQ runs as a StatefulSet in the fanout namespace
  - Dead letter queue: fanout.dlq (check depth via RabbitMQ management API at http://127.0.0.1:15672)
  - RabbitMQ credentials: guest / guest
  - A status API runs at http://127.0.0.1:18080

  [Your Mission]

  1. Diagnose: Examine init container logs across multiple pod restarts; confirm the race
     condition by observing empty config file content in init container logs.

  2. Fix the init container guard: Update the 'fanout-init-script' ConfigMap so that
     validate-config.sh retries reading queues.conf and exchanges.conf until both files
     are non-empty (up to 60 seconds, checking every 2 seconds), then exits 0 only when
     both files have non-empty content. Exit 1 if the timeout is reached.

     Required guard logic (pseudo-code):
       for i in 1..30:
         if [ -s /config/queues.conf ] && [ -s /config/exchanges.conf ]: exit 0
         sleep 2
       exit 1

  3. Separate volume mounts (optional but awarded): Split the projected volume into two
     separate volumes — one plain ConfigMap volume for 'fanout-config' and one projected
     volume for the ServiceAccount token only — to eliminate the race at the kubelet level.

  4. Verify: Trigger a rolling restart of fanout-service. Confirm init container exits 0
     consistently. Confirm dead letter queue depth returns to 0.

  [API Specification]

  Base URL: http://127.0.0.1:18080

  GET /status
    Response: HTTP 200 {"status": "ok", "dlq_depth": <int>, "init_guard": <bool>}

  GET /pod-starts
    Response: HTTP 200 [{"pod": <str>, "init_exit_code": <int>, "config_nonempty": <bool>}, ...]

  [Success Criteria]
  - Init container script retries until config files are non-empty (guard logic present)
  - fanout-service pods restart with init container ExitCode 0 in all observed starts
  - Dead letter queue depth for fanout.dlq is 0
  - queues.conf and exchanges.conf are non-empty at init container startup (verified via logs)
  - task_baseline ConfigMap unchanged

  [Environment Details]
  - Use kubectl to interact with pods: kubectl -n fanout get pods
  - RabbitMQ management API: http://127.0.0.1:15672 (guest/guest)
  - Status API: http://127.0.0.1:18080

metadata:
  category: platform-eng
  difficulty: medium
  domains:
    - configmap-propagation
    - rabbitmq
    - kubernetes-workloads
  components:
